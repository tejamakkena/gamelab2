<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tambola (Housie) - GameLab</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
    <style>
        body { font-family: Arial, sans-serif; background: #1a1a2e; color: #eee; }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        h1 { text-align: center; color: #e94560; }

        /* Lobby */
        #lobby { background: #16213e; border-radius: 12px; padding: 30px; margin-bottom: 20px; }
        #lobby input { width: 100%; padding: 10px; margin: 8px 0; border-radius: 6px; border: 1px solid #444; background: #0f3460; color: #eee; box-sizing: border-box; }
        #lobby button { width: 48%; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 1rem; margin: 4px 1%; }
        #createGame { background: #e94560; color: #fff; }
        #joinGame { background: #0f3460; color: #fff; }

        /* Status */
        #statusMessage { padding: 10px; border-radius: 6px; margin: 10px 0; text-align: center; display: none; }
        .status-info { background: #0f3460; color: #7ec8e3; display: block !important; }
        .status-error { background: #3d0000; color: #ff6b6b; display: block !important; }
        .status-success { background: #003d00; color: #6bff6b; display: block !important; }

        /* Game area */
        #gameArea { display: none; }
        .game-info { display: flex; justify-content: space-between; align-items: center; background: #16213e; padding: 12px 20px; border-radius: 8px; margin-bottom: 16px; flex-wrap: wrap; gap: 10px; }
        .game-info span { font-size: 0.9rem; color: #aaa; }
        .game-info strong { color: #e94560; }

        /* Current number */
        .number-display { font-size: 5rem; font-weight: bold; color: #e94560; text-align: center; margin: 16px 0; text-shadow: 0 0 20px #e94560; }

        /* Host controls */
        #hostControls { text-align: center; margin: 12px 0; }
        #hostControls button { padding: 12px 28px; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; margin: 4px; }
        #startGame { background: #28a745; color: #fff; }
        #callNumber { background: #e94560; color: #fff; display: none; }

        /* Ticket */
        .ticket-grid { display: grid; grid-template-columns: repeat(9, 1fr); gap: 4px; max-width: 580px; margin: 16px auto; }
        .ticket-cell { aspect-ratio: 1; border: 2px solid #333; display: flex; align-items: center; justify-content: center; font-size: 1rem; font-weight: bold; border-radius: 4px; background: #16213e; }
        .ticket-cell.empty { background: #0a0a1a; border-color: #222; }
        .ticket-cell.marked { background: #e94560; color: #fff; border-color: #e94560; transform: scale(0.95); }

        /* Claim buttons */
        .controls { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin: 16px 0; }
        .controls button { padding: 8px 16px; border: 2px solid #e94560; background: transparent; color: #e94560; border-radius: 20px; cursor: pointer; font-size: 0.85rem; transition: all 0.2s; }
        .controls button:hover { background: #e94560; color: #fff; }
        .controls button.claimed { background: #28a745; border-color: #28a745; color: #fff; cursor: default; }

        /* Called numbers */
        .called-numbers { background: #16213e; border-radius: 8px; padding: 16px; margin-top: 16px; }
        .called-numbers h4 { margin: 0 0 10px; color: #aaa; }
        #calledList { display: flex; flex-wrap: wrap; gap: 6px; }
        .called-badge { background: #0f3460; color: #7ec8e3; border-radius: 50%; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎲 Tambola (Housie)</h1>

        <div id="statusMessage"></div>

        <div id="lobby">
            <input type="text" id="playerNameInput" placeholder="Your name">

            <hr style="border-color:#333; margin: 16px 0;">

            <p style="color:#aaa; margin: 0 0 8px;">Create a new game or join with a Game ID:</p>
            <input type="text" id="gameIdInput" placeholder="Game ID (to join)">

            <div style="display:flex; gap:8px; margin-top:8px;">
                <button id="createGame">🎯 Create Game</button>
                <button id="joinGame">🚪 Join Game</button>
            </div>
        </div>

        <div id="gameArea">
            <div class="game-info">
                <span>Game ID: <strong id="gameIdDisplay">—</strong></span>
                <span>Players: <strong id="playerCount">1</strong></span>
                <span>Remaining: <strong id="remainingCount">90</strong></span>
            </div>

            <div class="number-display" id="currentNumber">--</div>

            <div id="hostControls" style="display:none;">
                <button id="startGame">▶ Start Game</button>
                <button id="callNumber">🎲 Call Next Number</button>
            </div>

            <h3 style="text-align:center; color:#aaa;">Your Ticket</h3>
            <div class="ticket-grid" id="ticketGrid"></div>

            <div class="controls">
                <button id="btn-early_5" onclick="claimWin('early_5')">⭐ Early 5</button>
                <button id="btn-top_line" onclick="claimWin('top_line')">— Top Line</button>
                <button id="btn-middle_line" onclick="claimWin('middle_line')">— Middle Line</button>
                <button id="btn-bottom_line" onclick="claimWin('bottom_line')">— Bottom Line</button>
                <button id="btn-full_house" onclick="claimWin('full_house')">🏠 Full House</button>
            </div>

            <div class="called-numbers">
                <h4>Called Numbers:</h4>
                <div id="calledList"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="{{ url_for('static', filename='js/tambola.js') }}"></script>
</body>
</html>
