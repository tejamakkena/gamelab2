<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0a0015">
    <title>404 — Page Not Found</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Space+Grotesk:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Space Grotesk', 'Segoe UI', sans-serif;
            background: #04000f;
            color: #e8e4ff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 70% 50% at 30% 20%, rgba(0, 245, 255, 0.1) 0%, transparent 60%),
                radial-gradient(ellipse 60% 40% at 70% 80%, rgba(191, 95, 255, 0.12) 0%, transparent 55%);
            pointer-events: none;
        }

        .error-container {
            padding: 60px 40px;
            position: relative;
            z-index: 1;
        }

        .error-code {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(6em, 20vw, 10em);
            font-weight: 900;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #00f5ff 0%, #a78bfa 50%, #bf5fff 100%);
            background-size: 200% 200%;
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 4s ease-in-out infinite;
            line-height: 1;
            margin-bottom: 24px;
            filter: drop-shadow(0 0 40px rgba(0, 245, 255, 0.3));
        }

        @keyframes shimmer {
            0%, 100% { background-position: 0% 50%; }
            50%       { background-position: 100% 50%; }
        }

        h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.4em;
            font-weight: 700;
            color: #e8e4ff;
            margin-bottom: 16px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        p {
            font-size: 1em;
            color: #9d8fc4;
            margin-bottom: 40px;
            letter-spacing: 0.02em;
        }

        a {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 245, 255, 0.1);
            backdrop-filter: blur(12px);
            color: #00f5ff;
            text-decoration: none;
            padding: 14px 32px;
            border-radius: 12px;
            border: 1px solid rgba(0, 245, 255, 0.3);
            font-size: 1em;
            font-weight: 600;
            letter-spacing: 0.03em;
            transition: all 0.25s ease;
            box-shadow: 0 0 20px rgba(0, 245, 255, 0.1);
        }

        a:hover {
            transform: translateY(-2px);
            background: rgba(0, 245, 255, 0.18);
            border-color: rgba(0, 245, 255, 0.6);
            box-shadow: 0 8px 24px rgba(0, 245, 255, 0.3);
            color: white;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-code">404</div>
        <h2>Signal Lost</h2>
        <p>The sector you're looking for doesn't exist in this universe.</p>
        <a href="/">← Return to Hub</a>
    </div>
</body>
</html>
