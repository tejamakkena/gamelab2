<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0a0015">
    <title>{% block title %}Futuristic Games Hub{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='/css/main.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='/css/mobile-improvements.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='/css/futuristic.css') }}">
    {% block extra_css %}{% endblock %}
    {% block extra_head %}{% endblock %}
</head>
<body {% if user %}data-user='{{ user|tojson }}'{% endif %}>
    {% block content %}{% endblock %}
    
    <!-- Load utilities FIRST (CleanupManager, etc.) -->
    <script src="{{ url_for('static', filename='/js/utils.js') }}"></script>
    
    <!-- Theme Toggle -->
    <script src="{{ url_for('static', filename='/js/theme-toggle.js') }}"></script>
    
    <!-- Scripts should be at the end of body -->
    {% block extra_js %}{% endblock %}
</body>
</html>
